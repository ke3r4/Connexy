version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: connexy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-connexy-dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: connexy
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-connexy-dev}
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data

  vllm:
    image: vllm/vllm-openai:latest
    command: ["--model", "mistralai/Mistral-7B-Instruct-v0.3", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - model_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    build: .
    ports:
      - "8787:8787"
    environment:
      ENVIRONMENT: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: connexy
      DB_PASSWORD: ${POSTGRES_PASSWORD:-connexy-dev}
      VECTORIZE_HOST: qdrant
      VECTORIZE_PORT: 6333
      R2_ENDPOINT: http://minio:9000
      MISTRAL_ENDPOINT: http://vllm:8080/v1
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  model_cache: